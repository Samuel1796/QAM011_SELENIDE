name: Selenide UI Tests

on:
  push:
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        env:
          SELENIDE_HEADLESS: true
        run: mvn verify

      # ── Allure report generation ──────────────────────────────────────────
      # Generate the HTML report from the raw allure-results produced by mvn verify.
      # We use the allure-commandline action so the report is self-contained and
      # ready to be served as a static site on GitHub Pages.
      - name: Generate Allure HTML report
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          # Keep the last 20 runs of history so trend graphs work
          keep_reports: 20

      # ── GitHub Pages deployment ───────────────────────────────────────────
      # Publish the generated report to the gh-pages branch.
      # After the first successful run, the report is available at:
      #   https://<org>.github.io/<repo>/
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          # Overwrite the previous report on every push so the page always
          # shows the latest run (history is preserved inside the report itself)
          force_orphan: false

      # ── Artifact uploads (kept for direct download from the Actions tab) ──
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: target/screenshots/

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      # ── Failure notification ──────────────────────────────────────────────
      - name: Notify on failure via Slack
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text": "Tests failed on ${{ github.ref }} - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
