name: Selenide UI Tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        id: run_tests
        run: mvn verify -Dselenide.headless=true
        continue-on-error: true

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.29.0
          wget -qO allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history target/allure-results/history
          fi

      - name: Generate Allure HTML report
        if: always()
        run: allure generate target/allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: target/screenshots/
          if-no-files-found: ignore

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      # Parse Surefire XML reports — python3 -c avoids heredoc/quote issues in YAML
      - name: Parse Surefire reports
        id: surefire
        if: always() && steps.run_tests.outcome == 'failure'
        run: |
          python3 -c "
          import os, sys, xml.etree.ElementTree as ET
          d = 'target/surefire-reports'
          total = failed = skipped = 0
          names = []
          if os.path.isdir(d):
              for f in sorted(os.listdir(d)):
                  if not f.startswith('TEST-') or not f.endswith('.xml'):
                      continue
                  try:
                      root = ET.parse(os.path.join(d, f)).getroot()
                      s = root if root.tag == 'testsuite' else (root.find('testsuite') or root)
                      total   += int(s.get('tests',    0) or 0)
                      failed  += int(s.get('failures', 0) or 0) + int(s.get('errors', 0) or 0)
                      skipped += int(s.get('skipped',  0) or 0)
                      for tc in root.findall('.//testcase'):
                          if tc.find('failure') is not None or tc.find('error') is not None:
                              names.append(tc.get('classname','') + '.' + tc.get('name',''))
                  except Exception as e:
                      print('WARN:', e, file=sys.stderr)
          passed = total - failed - skipped
          summary = 'Total: ' + str(total) + '\nPassed: ' + str(passed) + '\nFailed: ' + str(failed) + '\nSkipped: ' + str(skipped)
          failures = '\n'.join('* ' + n for n in names) if names else '* (no names found)'
          out = open(os.environ['GITHUB_OUTPUT'], 'a')
          out.write('SUMMARY<<EOF\n' + summary + '\nEOF\n')
          out.write('FAILURES<<EOF\n' + failures + '\nEOF\n')
          out.close()
          "

      # Build Slack payload — jq filter written via printf to avoid single-quote issues in YAML
      - name: Build Slack payload
        if: always() && steps.run_tests.outcome == 'failure'
        env:
          REPO: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          SHA_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          SUMMARY: ${{ steps.surefire.outputs.SUMMARY }}
          FAILURES: ${{ steps.surefire.outputs.FAILURES }}
        run: |
          printf '%s' '{
            "blocks": [
              {"type":"header","text":{"type":"plain_text","text":"Test Suite Failed","emoji":true}},
              {"type":"section","fields":[
                {"type":"mrkdwn","text":"*Repository:*\nREPO_PLACEHOLDER"},
                {"type":"mrkdwn","text":"*Branch:*\nBRANCH_PLACEHOLDER"},
                {"type":"mrkdwn","text":"*Triggered by:*\nACTOR_PLACEHOLDER"},
                {"type":"mrkdwn","text":"*Commit:*\nSHA_PLACEHOLDER"}
              ]},
              {"type":"section","text":{"type":"mrkdwn","text":"*Test summary*\nSUMMARY_PLACEHOLDER"}},
              {"type":"section","text":{"type":"mrkdwn","text":"*Failed tests*\nFAILURES_PLACEHOLDER"}},
              {"type":"actions","elements":[
                {"type":"button","text":{"type":"plain_text","text":"View Run Logs","emoji":true},"url":"RUN_URL_PLACEHOLDER"},
                {"type":"button","text":{"type":"plain_text","text":"Allure Report","emoji":true},"url":"REPORT_URL_PLACEHOLDER"}
              ]},
              {"type":"context","elements":[
                {"type":"mrkdwn","text":"Screenshots and Allure results are attached as build artifacts."}
              ]}
            ]
          }' > /tmp/raw_payload.json

          python3 -c "
          import json, os
          with open('/tmp/raw_payload.json') as f:
              text = f.read()
          sha = os.environ['SHA'][:7]
          repo_link = '<' + os.environ['REPO_URL'] + '|' + os.environ['REPO'] + '>'
          sha_link  = '<' + os.environ['SHA_URL']  + '|' + sha + '>'
          text = text.replace('REPO_PLACEHOLDER',    repo_link)
          text = text.replace('BRANCH_PLACEHOLDER',  os.environ['BRANCH'])
          text = text.replace('ACTOR_PLACEHOLDER',   os.environ['ACTOR'])
          text = text.replace('SHA_PLACEHOLDER',     sha_link)
          text = text.replace('SUMMARY_PLACEHOLDER', os.environ['SUMMARY'].replace(chr(10), r'\n'))
          text = text.replace('FAILURES_PLACEHOLDER',os.environ['FAILURES'].replace(chr(10), r'\n'))
          text = text.replace('RUN_URL_PLACEHOLDER',    os.environ['RUN_URL'])
          text = text.replace('REPORT_URL_PLACEHOLDER', os.environ['REPORT_URL'])
          json.loads(text)
          with open('/tmp/slack_payload.json', 'w') as f:
              f.write(text)
          print('Payload written OK')
          "

      - name: Notify on failure via Slack
        if: always() && steps.run_tests.outcome == 'failure'
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file-path: /tmp/slack_payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Mark workflow as failed when tests fail
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

