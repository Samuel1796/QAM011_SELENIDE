name: Selenide UI Tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        id: run_tests
        run: mvn verify -Dselenide.headless=true
        continue-on-error: true

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.29.0
          wget -qO allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Get Allure history from gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history target/allure-results/history
            echo "History copied from previous run."
          else
            echo "No previous history - first run."
          fi

      - name: Generate Allure HTML report
        if: always()
        run: allure generate target/allure-results --clean -o allure-report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: target/screenshots/
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Write Surefire parser script
        if: always()
        run: |
          cat > /tmp/parse_surefire.py << 'PYEOF'
          import os
          import sys
          import xml.etree.ElementTree as ET

          reports_dir = "target/surefire-reports"
          total = failed = skipped = 0
          failed_tests = []

          if os.path.isdir(reports_dir):
              for fname in sorted(os.listdir(reports_dir)):
                  if not fname.startswith("TEST-") or not fname.endswith(".xml"):
                      continue

                  fpath = os.path.join(reports_dir, fname)
                  try:
                      tree = ET.parse(fpath)
                      root = tree.getroot()
                      suite = root if root.tag == "testsuite" else root.find("testsuite")
                      if suite is None:
                          suite = root

                      total += int(suite.get("tests", 0))
                      failed += int(suite.get("failures", 0)) + int(suite.get("errors", 0))
                      skipped += int(suite.get("skipped", 0))

                      for tc in tree.findall(".//testcase"):
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              classname = tc.get("classname", "")
                              name = tc.get("name", "")
                              failed_tests.append(f"{classname}.{name}")
                  except Exception as ex:
                      print(f"WARN: could not parse {fpath}: {ex}", file=sys.stderr)

          passed = total - failed - skipped
          summary = (
              f"* Total: {total}\\n"
              f"* Passed: {passed}\\n"
              f"* Failed: {failed}\\n"
              f"* Skipped: {skipped}"
          )

          if failed_tests:
              failures = "\\n".join(f"* {t}" for t in failed_tests)
          else:
              failures = "* None"

          print(f"SUMMARY<<ENDOFVAR\\n{summary}\\nENDOFVAR")
          print(f"FAILURES<<ENDOFVAR\\n{failures}\\nENDOFVAR")
          PYEOF

      - name: Parse Surefire reports
        id: surefire
        if: always()
        run: python3 /tmp/parse_surefire.py >> "$GITHUB_OUTPUT"

      - name: Build Slack payload
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            STATUS_ICON="PASS"
            STATUS_TEXT="Test Suite Passed"
          else
            STATUS_ICON="FAIL"
            STATUS_TEXT="Test Suite Failed"
          fi

          jq -n \
            --arg status_icon "$STATUS_ICON" \
            --arg status_text "$STATUS_TEXT" \
            --arg repo "${{ github.repository }}" \
            --arg repo_url "${{ github.server_url }}/${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg sha "${{ github.sha }}" \
            --arg sha_url "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg report_url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --arg summary "${{ steps.surefire.outputs.SUMMARY }}" \
            --arg failures "${{ steps.surefire.outputs.FAILURES }}" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: ($status_icon + " " + $status_text), emoji: true }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Repository:*\\n<" + $repo_url + "|" + $repo + ">") },
                    { type: "mrkdwn", text: ("*Branch:*\\n`" + $branch + "`") },
                    { type: "mrkdwn", text: ("*Triggered by:*\\n" + $actor) },
                    { type: "mrkdwn", text: ("*Commit:*\\n<" + $sha_url + "|`" + ($sha | .[0:7]) + "`>") }
                  ]
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Test summary*\\n" + $summary) }
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Failed tests*\\n" + $failures) }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "View Run Logs", emoji: true },
                      url: $run_url
                    },
                    {
                      type: "button",
                      text: { type: "plain_text", text: "Allure Report (GitHub Pages)", emoji: true },
                      url: $report_url
                    }
                  ]
                }
              ]
            }' > /tmp/slack_payload.json

      - name: Notify via Slack
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file-path: /tmp/slack_payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
