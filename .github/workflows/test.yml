name: Selenide UI Tests

on:
  push:
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        env:
          SELENIDE_HEADLESS: true
        run: mvn verify
        # Continue so the report is always generated, even on test failures
        continue-on-error: true

      # ── Pull previous Allure history from gh-pages ────────────────────────
      # Copies the history/ directory from the previously deployed report so
      # trend graphs work across runs. Silently skipped on the very first run
      # when the gh-pages branch does not yet exist.
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history target/allure-results/history
            echo "History copied from previous run."
          else
            echo "No previous history found — first run."
          fi

      # ── Generate Allure HTML report ───────────────────────────────────────
      - name: Generate Allure HTML report
        uses: simple-elf/allure-report-action@v1.9
        if: always()
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          keep_reports: 20

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      # Publishes the generated report to the gh-pages branch root so it is
      # served at https://<user>.github.io/<repo>/
      # force_orphan: true ensures a clean branch is created on first run and
      # avoids stale files accumulating across deploys.
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      # ── Artifact uploads ──────────────────────────────────────────────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: target/screenshots/
          if-no-files-found: ignore

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      # ── Failure notification ──────────────────────────────────────────────
      - name: Notify on failure via Slack
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text": "Tests failed on ${{ github.ref }} - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
