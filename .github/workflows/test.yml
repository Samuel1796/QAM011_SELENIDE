name: Selenide UI Tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        id: run_tests
        # Pass headless flag as a Maven system property so Selenide picks it up
        # directly from the properties mechanism — no env var needed.
        run: mvn verify -Dselenide.headless=true
        continue-on-error: true

      # ── Install Allure CLI ────────────────────────────────────────────────
      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.29.0
          wget -qO allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # ── Pull previous Allure history from gh-pages ────────────────────────
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history target/allure-results/history
            echo "History copied from previous run."
          else
            echo "No previous history — first run."
          fi

      # ── Generate Allure HTML report ───────────────────────────────────────
      - name: Generate Allure HTML report
        if: always()
        run: allure generate target/allure-results --clean -o allure-report

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      # ── Artifact uploads ──────────────────────────────────────────────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: target/screenshots/
          if-no-files-found: ignore

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      # ── Failure notification ──────────────────────────────────────────────
      # Parse Surefire XML reports to extract failed test names, then build
      # the Slack payload with jq so all values are safely escaped.
      - name: Build Slack payload
        if: ${{ always() && steps.run_tests.outcome == 'failure' }}
        run: |
          # Extract failed test cases from Surefire XML reports.
          # Each <testcase> that contains a <failure> or <error> child is a failure.
          # Output format: "ClassName > methodName"
          FAILED_TESTS=""
          if [ -d "target/surefire-reports" ]; then
            FAILED_TESTS=$(
              grep -rh '<testcase' target/surefire-reports/*.xml 2>/dev/null \
              | grep -E '<failure|<error' \
              | sed 's/.*classname="\([^"]*\)".*name="\([^"]*\)".*/\1 > \2/' \
              || true
            )

            # Fallback: use xmllint if grep approach yields nothing
            if [ -z "$FAILED_TESTS" ]; then
              FAILED_TESTS=$(
                for f in target/surefire-reports/*.xml; do
                  xmllint --xpath \
                    "//testcase[failure or error]/@classname | //testcase[failure or error]/@name" \
                    "$f" 2>/dev/null \
                  | tr ' ' '\n' \
                  | sed 's/classname="\(.*\)"/CLASS:\1/' \
                  | sed 's/name="\(.*\)"/METHOD:\1/' \
                  | paste - - \
                  | sed 's/CLASS:\(.*\)\tMETHOD:\(.*\)/\1 > \2/'
                done || true
              )
            fi
          fi

          # If still empty, show a generic message
          if [ -z "$FAILED_TESTS" ]; then
            FAILED_TESTS="Could not extract test names — check the run logs."
          fi

          # Format as a bullet list for Slack mrkdwn
          FAILED_LIST=$(echo "$FAILED_TESTS" | sed 's/^/• /')

          jq -n \
            --arg repo       "${{ github.repository }}" \
            --arg repo_url   "${{ github.server_url }}/${{ github.repository }}" \
            --arg branch     "${{ github.ref_name }}" \
            --arg actor      "${{ github.actor }}" \
            --arg sha        "${{ github.sha }}" \
            --arg sha_url    "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --arg run_url    "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg report_url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --arg failures   "$FAILED_LIST" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: "❌ Test Suite Failed", emoji: true }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Repository:*\n<" + $repo_url + "|" + $repo + ">") },
                    { type: "mrkdwn", text: ("*Branch:*\n`" + $branch + "`") },
                    { type: "mrkdwn", text: ("*Triggered by:*\n" + $actor) },
                    { type: "mrkdwn", text: ("*Commit:*\n<" + $sha_url + "|`" + ($sha | .[0:7]) + "`>") }
                  ]
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Failed tests:*\n" + $failures) }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "🔍 View Run Logs", emoji: true },
                      url: $run_url
                    },
                    {
                      type: "button",
                      text: { type: "plain_text", text: "📊 Allure Report", emoji: true },
                      url: $report_url
                    }
                  ]
                },
                {
                  type: "context",
                  elements: [
                    { type: "mrkdwn", text: "Screenshots and full Allure results are attached as build artifacts in the run above." }
                  ]
                }
              ]
            }' > /tmp/slack_payload.json

      - name: Notify on failure via Slack
        if: ${{ always() && steps.run_tests.outcome == 'failure' }}
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file-path: /tmp/slack_payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
