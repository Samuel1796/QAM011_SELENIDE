name: Selenide UI Tests

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        id: run_tests
        # Pass headless flag as a Maven system property so Selenide picks it up
        # directly from the properties mechanism — no env var needed.
        run: mvn verify -Dselenide.headless=true
        continue-on-error: true

      # ── Install Allure CLI ────────────────────────────────────────────────
      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.29.0
          wget -qO allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          sudo mv allure-${ALLURE_VERSION} /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      # ── Pull previous Allure history from gh-pages ────────────────────────
      - name: Get Allure history from gh-pages
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy previous Allure history
        if: always()
        continue-on-error: true
        run: |
          if [ -d "gh-pages/history" ]; then
            cp -r gh-pages/history target/allure-results/history
            echo "History copied from previous run."
          else
            echo "No previous history — first run."
          fi

      # ── Generate Allure HTML report ───────────────────────────────────────
      - name: Generate Allure HTML report
        if: always()
        run: allure generate target/allure-results --clean -o allure-report

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          force_orphan: true

      # ── Artifact uploads ──────────────────────────────────────────────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: target/screenshots/
          if-no-files-found: ignore

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/

      # ── Failure notification ──────────────────────────────────────────────
      # Parse Surefire XML reports to extract test summary counts and failed
      # test names, then build the Slack payload with jq for safe escaping.
      - name: Build Slack payload
        if: ${{ always() && steps.run_tests.outcome == 'failure' }}
        run: |
          # ── Aggregate counts from all Surefire XML files ──────────────────
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0

          if [ -d "target/surefire-reports" ]; then
            for f in target/surefire-reports/TEST-*.xml; do
              [ -f "$f" ] || continue
              t=$(xmllint  --xpath "string(//testsuite/@tests)"    "$f" 2>/dev/null || echo 0)
              fa=$(xmllint --xpath "string(//testsuite/@failures)"  "$f" 2>/dev/null || echo 0)
              er=$(xmllint --xpath "string(//testsuite/@errors)"    "$f" 2>/dev/null || echo 0)
              sk=$(xmllint --xpath "string(//testsuite/@skipped)"   "$f" 2>/dev/null || echo 0)
              TOTAL=$((TOTAL   + ${t:-0}))
              FAILED=$((FAILED + ${fa:-0} + ${er:-0}))
              SKIPPED=$((SKIPPED + ${sk:-0}))
            done
            PASSED=$((TOTAL - FAILED - SKIPPED))
          fi

          # ── Extract failed test names as classname.methodname ─────────────
          FAILED_LIST=""
          if [ -d "target/surefire-reports" ]; then
            for f in target/surefire-reports/TEST-*.xml; do
              [ -f "$f" ] || continue
              # Pull every <testcase classname="..." name="..."> that has a
              # <failure> or <error> child element
              while IFS= read -r line; do
                classname=$(echo "$line" | sed 's/.*classname="\([^"]*\)".*/\1/')
                methodname=$(echo "$line" | sed 's/.*name="\([^"]*\)".*/\1/')
                FAILED_LIST="${FAILED_LIST}• ${classname}.${methodname}\n"
              done < <(
                python3 - "$f" <<'PYEOF'
import sys, xml.etree.ElementTree as ET
tree = ET.parse(sys.argv[1])
for tc in tree.findall('.//testcase'):
    if tc.find('failure') is not None or tc.find('error') is not None:
        print(f'classname="{tc.get("classname")}" name="{tc.get("name")}"')
PYEOF
              )
            done
          fi

          [ -z "$FAILED_LIST" ] && FAILED_LIST="• (no test names found — check run logs)\n"

          # ── Build summary and failed-tests strings ────────────────────────
          SUMMARY="• Total: ${TOTAL}\n• Passed: ${PASSED}\n• Failed: ${FAILED}\n• Skipped: ${SKIPPED}"

          # printf to interpret \n escape sequences
          SUMMARY_TEXT=$(printf "$SUMMARY")
          FAILED_TEXT=$(printf "$FAILED_LIST")

          jq -n \
            --arg repo       "${{ github.repository }}" \
            --arg repo_url   "${{ github.server_url }}/${{ github.repository }}" \
            --arg branch     "${{ github.ref_name }}" \
            --arg actor      "${{ github.actor }}" \
            --arg sha        "${{ github.sha }}" \
            --arg sha_url    "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --arg run_url    "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg report_url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --arg summary    "$SUMMARY_TEXT" \
            --arg failures   "$FAILED_TEXT" \
            '{
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: "❌ Test Suite Failed", emoji: true }
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Repository:*\n<" + $repo_url + "|" + $repo + ">") },
                    { type: "mrkdwn", text: ("*Branch:*\n`" + $branch + "`") },
                    { type: "mrkdwn", text: ("*Triggered by:*\n" + $actor) },
                    { type: "mrkdwn", text: ("*Commit:*\n<" + $sha_url + "|`" + ($sha | .[0:7]) + "`>") }
                  ]
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Test summary*\n" + $summary) }
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: ("*Failed tests*\n" + $failures) }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "🔍 View Run Logs", emoji: true },
                      url: $run_url
                    },
                    {
                      type: "button",
                      text: { type: "plain_text", text: "📊 Allure Report", emoji: true },
                      url: $report_url
                    }
                  ]
                },
                {
                  type: "context",
                  elements: [
                    { type: "mrkdwn", text: "Screenshots and full Allure results are attached as build artifacts in the run above." }
                  ]
                }
              ]
            }' > /tmp/slack_payload.json

      - name: Notify on failure via Slack
        if: ${{ always() && steps.run_tests.outcome == 'failure' }}
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file-path: /tmp/slack_payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
